# Tomcat
server:
  port: 9701

knife4j:
  enable: true
# Spring
spring:
  messages:
    basename: i18n/messages
    cache-seconds: 3600
    encoding: UTF-8
    fallbackToSystemLocale: false
  application:
    # 应用名称
    name: staitech-fr
  profiles:
    # 环境配置
    active: @activatedProperties@
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: @serverAddr@
        # nacos namespace
        namespace: @nacosNamespace@
        # nacos group
        group: @nacosGroup@
      config:
        # 配置中心地址
        server-addr: @serverAddr@
        # 配置文件格式
        file-extension: yml
        # nacos namespace
        namespace: @nacosNamespace@
        # nacos group
        group: @nacosGroup@
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

